<!DOCTYPE html>
<html>
<head>
<title>exclusivo pra milena</title>

<style>
body {
    background-color: black;
    text-align: center;
    font-family: Arial;
    color: white;
    overflow: hidden;
}

h1 {
    color: hotpink;
}

.heart {
    font-size: 50px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* imagens lado a lado */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.container img {
    width: 250px;
    border-radius: 15px;
    border: 2px solid white;
}

.caixa {
    position: relative;
}

.texto {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-weight: bold;
    background: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 10px;
}

/* botão música */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background-color: hotpink;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* 💖 corações caindo */
.heart-fall {
    position: fixed;
    top: -50px;
    color: hotpink;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>

</head>

<body>

<h1>Oi, amor ❤️</h1>
<p>se você abriu esse site, você é linda</p>

<div class="heart">❤️</div>

<button onclick="document.getElementById('musica').play()">
Tocar música 🎵
</button>

<audio id="musica" loop>
    <source src="herewithme.mp3" type="audio/mpeg">
</audio>

<br>

<div class="container">

    <div class="caixa">
        <div class="texto">Você é esplêndida 💖</div>
        <img src="milena.jpg">
    </div>

    <div class="caixa">
        <div class="texto">Eu te amo. </div>
        <img src="milena2.jpg">
    </div>

</div>

<!-- corações caindo -->
<script>
function criarCoracao() {
    const heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart-fall");

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (2 + Math.random() * 3) + "s";
    heart.style.fontSize = (15 + Math.random() * 25) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(criarCoracao, 300);
</script>

</body>
</html>
