<!DOCTYPE html>
<html>
<head>
<title>exclusivo pra milena</title>

<style>
body {
    background-color: pink;
    text-align: center;
    font-family: Arial;
}

h1 {
    color: red;
}

/* coração animado */
.heart {
    font-size: 50px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* container da imagem */
.container {
    position: relative;
    display: inline-block;
}

/* texto em cima da imagem */
.texto {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 20px;
    font-weight: bold;
    background-color: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>Oi, amor ❤️</h1>
<p>se você abriu esse site, você é linda</p>

<div class="heart">❤️</div>

<br><br>

<div class="container">
    <div class="texto">Você é esplendida 💖</div>
    <img src="milena.jpg" width="250">
</div>

<br><br>

<div class="container">
    <div class="texto">Eu amo você. </div>
    <img src="milena2.jpg" width="250">
</div>

</body>
</html>
