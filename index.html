<!DOCTYPE html>
<html>
<head>
<title>exclusivo pra milena</title>

<style>
body {
    background-color: black;
    text-align: center;
    font-family: Arial;
    color: white;
}

/* título */
h1 {
    color: hotpink;
}

/* coração animado */
.heart {
    font-size: 50px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* linha das imagens */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

/* estilo das imagens */
.container img {
    width: 250px;
    border-radius: 15px;
    border: 2px solid white;
}

/* texto em cima */
.texto {
    position: absolute;
    color: white;
    font-weight: bold;
    background: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>Oi, amor ❤️</h1>
<p>se você abriu esse site, você é linda</p>

<div class="heart">❤️</div>

<br>

<!-- imagens lado a lado -->
<div class="container">

    <div style="position: relative;">
        <div class="texto">Você é esplêndida 💖</div>
        <img src="milena.jpg">
    </div>

    <div style="position: relative;">
        <div class="texto">Eu te amo. </div>
        <img src="milena2.jpg">
    </div>

</div>

</body>
</html>
